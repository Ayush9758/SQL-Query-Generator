<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cosmic AI SQL Generator — Turn natural language into powerful SQL queries using the power of the cosmos." />
    <meta name="theme-color" content="#04040f" />
    <title>Cosmic SQL Generator | AI-Powered Query Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <canvas id="star-canvas"></canvas>
    <div class="nebula-orb nebula-orb-1"></div>
    <div class="nebula-orb nebula-orb-2"></div>
    <div class="nebula-orb nebula-orb-3"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Starfield animation
      const canvas = document.getElementById('star-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function createStars(count) {
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.5 + 0.3,
            opacity: Math.random(),
            speed: Math.random() * 0.003 + 0.001,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      function drawStars(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of stars) {
          const alpha = 0.3 + 0.7 * ((Math.sin(t * s.speed + s.phase) + 1) / 2);
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(180, 160, 255, ${alpha})`;
          ctx.fill();
        }
        requestAnimationFrame(drawStars);
      }

      resize();
      createStars(200);
      requestAnimationFrame(drawStars);
      window.addEventListener('resize', () => { resize(); createStars(200); });
    </script>
  </body>
</html>
